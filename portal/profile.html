<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — ACK St. Mark's Parish - Malaa</title>
  <link rel="stylesheet" href="portal.css">
  <style>
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 200; align-items: center; justify-content: center; padding: 2rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card); border-radius: var(--radius); padding: 2rem;
      width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal h2 { margin-bottom: 1rem; }
    .modal-actions { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; }
    .btn-secondary { background: var(--bg-alt); color: var(--text); }
    .btn-secondary:hover { background: #ddd; }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="portal-header">
    <div class="brand"><img src="../img/ACK%20MACHAKOS%20LOGO.png" alt="ACK Logo" style="height:30px;width:auto"> <a href="/" style="color:inherit;text-decoration:none">ACK St. Mark's Parish - Malaa</a></div>
    <div class="user-info">
      <span id="displayName"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <nav class="portal-nav">
    <a href="dashboard">Dashboard</a>
    <a href="profile" class="active">My Profile</a>
    <a href="card">Membership Card</a>
    <a href="payments">Payments</a>
    <a href="announcements">Announcements</a>
    <a href="departments">Departments</a>
    <a href="/" style="border-left:1px solid var(--bg-alt);color:var(--accent)">&#8592; Site Home</a>
  </nav>
  <div class="portal-container">
    <div class="card">
      <h2>My Profile</h2>
      <div id="alert"></div>
      <form id="profileForm">
        <div class="form-group">
          <label for="full_name">Full Name</label>
          <input type="text" id="full_name" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender" required>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" required>
          </div>
        </div>
        <div class="form-group">
          <label for="marital_status">Marital Status</label>
          <select id="marital_status">
            <option value="">Select...</option>
            <option value="Single">Single</option>
            <option value="Married">Married</option>
            <option value="Divorced">Divorced</option>
            <option value="Widowed">Widowed</option>
          </select>
        </div>
        <div id="spouseFields" style="display:none">
          <div class="form-row">
            <div class="form-group">
              <label for="spouse_name">Spouse Name</label>
              <input type="text" id="spouse_name">
            </div>
            <div class="form-group">
              <label for="spouse_phone">Spouse Contact</label>
              <input type="tel" id="spouse_phone">
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>Children</label>
          <div id="childrenContainer"></div>
          <button type="button" onclick="addChildField()" style="background:none;border:2px dashed var(--bg-alt);border-radius:8px;padding:0.5rem;width:100%;cursor:pointer;color:var(--text-light);font-size:0.85rem;margin-top:0.5rem">+ Add Child</button>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Fellowship / Small Group</label>
            <div style="display:flex;align-items:center;gap:0.5rem">
              <span id="fellowshipDisplay" style="font-weight:600;color:var(--primary)">—</span>
              <button type="button" class="btn btn-sm btn-primary" onclick="openChangeRequestModal('fellowship')" style="padding:0.3rem 0.7rem;font-size:0.8rem">Request Change</button>
            </div>
          </div>
          <div class="form-group">
            <label>Department</label>
            <div style="display:flex;align-items:center;gap:0.5rem">
              <span id="departmentDisplay" style="font-weight:600;color:var(--primary)">—</span>
              <button type="button" class="btn btn-sm btn-primary" onclick="openChangeRequestModal('department')" style="padding:0.3rem 0.7rem;font-size:0.8rem">Request Change</button>
            </div>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </form>
    </div>

    <!-- Change Request Modal -->
    <div class="modal-overlay" id="changeRequestModal">
      <div class="modal">
        <h2 id="crModalTitle">Request Change</h2>
        <form id="changeRequestForm">
          <div class="form-group">
            <label>Current Value</label>
            <p id="crCurrentValue" style="font-weight:600;color:var(--text-light)">—</p>
          </div>
          <div class="form-group">
            <label for="crNewValue">Request New Value *</label>
            <select id="crNewValue" required>
              <option value="">Select...</option>
            </select>
          </div>
          <div class="modal-actions">
            <button type="submit" class="btn btn-primary">Submit Request</button>
            <button type="button" class="btn btn-secondary" onclick="closeModal('changeRequestModal')">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <div class="card">
      <h2>Change Requests</h2>
      <div id="changeRequestsList"><p style="color:var(--text-light)">No change requests.</p></div>
    </div>

    <div class="card">
      <h2>Change Password</h2>
      <form id="passwordForm">
        <div class="form-group">
          <label for="current_password">Current Password</label>
          <input type="password" id="current_password" required>
        </div>
        <div class="form-group">
          <label for="new_password">New Password</label>
          <input type="password" id="new_password" required minlength="4">
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm New Password</label>
          <input type="password" id="confirm_password" required minlength="4">
        </div>
        <button type="submit" class="btn btn-primary">Change Password</button>
      </form>
    </div>
  </div>

  <script src="portal.js"></script>
  <script>
    requireAuth();

    let profileData = null;
    let departmentsList = [];

    function addChildField(name = '', age = '') {
      const container = document.getElementById('childrenContainer');
      const div = document.createElement('div');
      div.className = 'form-row';
      div.style.marginBottom = '0.5rem';
      div.innerHTML = `
        <input type="text" class="child-name" placeholder="Child's name" value="${name}" style="width:100%;padding:0.6rem 1rem;border:2px solid var(--bg-alt);border-radius:8px;font-size:0.9rem">
        <input type="text" class="child-age" placeholder="Age / category" value="${age}" style="width:100%;padding:0.6rem 1rem;border:2px solid var(--bg-alt);border-radius:8px;font-size:0.9rem">
      `;
      container.appendChild(div);
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
    }

    document.getElementById('marital_status').addEventListener('change', function() {
      document.getElementById('spouseFields').style.display = this.value === 'Married' ? 'block' : 'none';
    });

    // ─── Change Request ───
    let crField = null;

    function openChangeRequestModal(field) {
      crField = field;
      const currentValue = profileData[field] || '';
      document.getElementById('crModalTitle').textContent = field === 'fellowship' ? 'Request Fellowship Change' : 'Request Department Change';
      document.getElementById('crCurrentValue').textContent = currentValue || '(none)';

      const sel = document.getElementById('crNewValue');
      sel.innerHTML = '<option value="">Select...</option>';

      if (field === 'fellowship') {
        ['Nazareth', 'Jerusalem', 'Judea', "Vicar's Care"].forEach(v => {
          if (v !== currentValue) {
            const o = document.createElement('option');
            o.value = v;
            o.textContent = v;
            sel.appendChild(o);
          }
        });
      } else {
        departmentsList.forEach(d => {
          if (d.name !== currentValue) {
            const o = document.createElement('option');
            o.value = d.name;
            o.textContent = d.name;
            sel.appendChild(o);
          }
        });
      }

      document.getElementById('changeRequestModal').classList.add('open');
    }

    document.getElementById('changeRequestForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      clearAlert();
      const requestedValue = document.getElementById('crNewValue').value;
      if (!requestedValue) { showAlert('Please select a new value'); return; }

      try {
        await apiFetch('/members/change-request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ field: crField, requested_value: requestedValue })
        });
        showAlert('Change request submitted for vicar approval!', 'success');
        closeModal('changeRequestModal');
        loadChangeRequests();
      } catch (err) { showAlert(err.message); }
    });

    async function loadChangeRequests() {
      try {
        const requests = await apiFetch('/members/change-requests');
        const container = document.getElementById('changeRequestsList');
        if (requests.length === 0) {
          container.innerHTML = '<p style="color:var(--text-light)">No change requests.</p>';
          return;
        }
        let html = '<div class="table-wrap"><table><thead><tr><th>Field</th><th>Current</th><th>Requested</th><th>Status</th><th>Date</th></tr></thead><tbody>';
        requests.forEach(r => {
          const badge = r.status === 'pending' ? '<span style="background:#fff3cd;color:#856404;padding:0.2rem 0.6rem;border-radius:50px;font-size:0.8rem">Pending</span>'
            : r.status === 'approved' ? '<span style="background:#d4edda;color:#155724;padding:0.2rem 0.6rem;border-radius:50px;font-size:0.8rem">Approved</span>'
            : '<span style="background:#fde8e8;color:#dc3545;padding:0.2rem 0.6rem;border-radius:50px;font-size:0.8rem">Rejected</span>';
          html += `<tr><td style="text-transform:capitalize">${r.field}</td><td>${r.current_value || '—'}</td><td><strong>${r.requested_value}</strong></td><td>${badge}</td><td>${formatDate(r.created_at)}</td></tr>`;
        });
        html += '</tbody></table></div>';
        container.innerHTML = html;
      } catch (_) {}
    }

    // ─── Profile ───
    async function loadProfile() {
      try {
        profileData = await apiFetch('/members/profile');
        departmentsList = await apiFetch('/departments');

        document.getElementById('displayName').textContent = profileData.full_name;

        document.getElementById('full_name').value = profileData.full_name;
        document.getElementById('gender').value = profileData.gender;
        document.getElementById('phone').value = profileData.phone;
        document.getElementById('marital_status').value = profileData.marital_status || '';

        if (profileData.marital_status === 'Married') {
          document.getElementById('spouseFields').style.display = 'block';
          document.getElementById('spouse_name').value = profileData.spouse_name || '';
          document.getElementById('spouse_phone').value = profileData.spouse_phone || '';
        }

        document.getElementById('fellowshipDisplay').textContent = profileData.fellowship || '(none)';
        document.getElementById('departmentDisplay').textContent = profileData.department || '(none)';

        const children = profileData.children_info || [];
        children.forEach(c => addChildField(c.name, c.age));

      } catch (err) {
        showAlert(err.message);
      }
    }

    document.getElementById('profileForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      clearAlert();

      const childNames = document.querySelectorAll('.child-name');
      const childAges = document.querySelectorAll('.child-age');
      const children = [];
      for (let i = 0; i < childNames.length; i++) {
        if (childNames[i].value.trim()) {
          children.push({ name: childNames[i].value.trim(), age: childAges[i].value.trim() });
        }
      }

      try {
        await apiFetch('/members/profile', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            full_name: document.getElementById('full_name').value,
            gender: document.getElementById('gender').value,
            phone: document.getElementById('phone').value,
            marital_status: document.getElementById('marital_status').value,
            spouse_name: document.getElementById('spouse_name').value,
            spouse_phone: document.getElementById('spouse_phone').value,
            children_info: children,
          })
        });
        showAlert('Profile updated successfully!', 'success');
      } catch (err) {
        showAlert(err.message);
      }
    });

    loadProfile();
    loadChangeRequests();

    document.getElementById('passwordForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const current = document.getElementById('current_password').value;
      const newPass = document.getElementById('new_password').value;
      const confirm = document.getElementById('confirm_password').value;
      if (newPass !== confirm) { showAlert('New passwords do not match'); return; }
      try {
        await apiFetch('/members/password', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ current_password: current, new_password: newPass })
        });
        showAlert('Password changed successfully!', 'success');
        document.getElementById('passwordForm').reset();
      } catch (err) { showAlert(err.message); }
    });
  </script>
</body>
</html>
