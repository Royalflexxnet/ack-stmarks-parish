<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements — ACK St. Mark's Parish - Malaa</title>
  <link rel="stylesheet" href="portal.css">
</head>
<body>
  <div class="portal-header">
    <div class="brand"><img src="../img/ACK%20MACHAKOS%20LOGO.png" alt="ACK Logo" style="height:30px;width:auto"> <a href="/" style="color:inherit;text-decoration:none">ACK St. Mark's Parish - Malaa</a></div>
    <div class="user-info">
      <span id="displayName"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <nav class="portal-nav">
    <a href="dashboard">Dashboard</a>
    <a href="profile">My Profile</a>
    <a href="card">Membership Card</a>
    <a href="payments">Payments</a>
    <a href="announcements" class="active">Announcements</a>
    <a href="departments">Departments</a>
    <a href="/" style="border-left:1px solid var(--bg-alt);color:var(--accent)">&#8592; Site Home</a>
  </nav>
  <div class="portal-container">
    <div class="card">
      <h2>Church Announcements</h2>
      <p style="color:var(--text-light);margin-bottom:1.5rem">Stay up to date with the latest news from ACK St. Mark's Parish - Malaa</p>
      <div id="announcementsList"><p style="color:var(--text-light)">Loading announcements...</p></div>
    </div>
  </div>

  <script src="portal.js"></script>
  <script>
    requireAuth();

    async function loadAnnouncements() {
      try {
        const announcements = await apiFetch('/announcements');
        const profile = await apiFetch('/members/profile');
        document.getElementById('displayName').textContent = profile.full_name;

        const container = document.getElementById('announcementsList');
        if (announcements.length === 0) {
          container.innerHTML = '<p style="color:var(--text-light)">No announcements at this time.</p>';
          return;
        }

        let html = '';
        announcements.forEach(a => {
          html += `<div class="announcement-item">
            <div class="ann-title">${a.title}</div>
            <div class="ann-date">${formatDate(a.created_at)}</div>
            <div class="ann-body">${a.body}</div>
          </div>`;
        });
        container.innerHTML = html;
      } catch (err) {
        showAlert(err.message);
      }
    }

    loadAnnouncements();
  </script>
</body>
</html>
