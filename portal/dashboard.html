<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — ACK St. Mark's Parish - Malaa</title>
  <link rel="stylesheet" href="portal.css">
</head>
<body>
  <div class="portal-header">
    <div class="brand"><img src="../img/ACK%20MACHAKOS%20LOGO.png" alt="ACK Logo" style="height:30px;width:auto"> <a href="/" style="color:inherit;text-decoration:none">ACK St. Mark's Parish - Malaa</a></div>
    <div class="user-info">
      <span id="displayName"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <nav class="portal-nav">
    <a href="dashboard" class="active">Dashboard</a>
    <a href="profile">My Profile</a>
    <a href="card">Membership Card</a>
    <a href="payments">Payments</a>
    <a href="announcements">Announcements</a>
    <a href="departments">Departments</a>
    <a href="/" style="border-left:1px solid var(--bg-alt);color:var(--accent)">&#8592; Site Home</a>
  </nav>
  <div class="portal-container">
    <div id="alert"></div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="statSince">—</div>
        <div class="stat-label">Member Since</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statContributions">—</div>
        <div class="stat-label">Total Contributions</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statDepartment">—</div>
        <div class="stat-label">Department</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statFellowship">—</div>
        <div class="stat-label">Fellowship</div>
      </div>
    </div>

    <div class="card">
      <h2>Recent Contributions</h2>
      <div id="recentContributions"><p style="color:var(--text-light)">No contributions yet.</p></div>
    </div>

    <div class="card">
      <h2>Latest Announcements</h2>
      <div id="latestAnnouncements"><p style="color:var(--text-light)">Loading...</p></div>
    </div>
  </div>

  <script src="portal.js"></script>
  <script>
    requireAuth();

    async function loadDashboard() {
      try {
        const profile = await apiFetch('/members/profile');
        const summary = await apiFetch('/payments/summary');
        const announcements = await apiFetch('/announcements');

        document.getElementById('displayName').textContent = profile.full_name;
        document.getElementById('statSince').textContent = formatDate(profile.created_at);
        document.getElementById('statContributions').textContent = formatCurrency(summary.total);
        document.getElementById('statDepartment').textContent = profile.department || 'None';
        document.getElementById('statFellowship').textContent = profile.fellowship || 'None';

        // Recent contributions
        const contribs = await apiFetch('/payments');
        const contribContainer = document.getElementById('recentContributions');
        if (contribs.length === 0) {
          contribContainer.innerHTML = '<p style="color:var(--text-light)">No contributions yet.</p>';
        } else {
          let html = '<div class="table-wrap"><table><thead><tr><th>Date</th><th>Type</th><th>Amount</th></tr></thead><tbody>';
          contribs.slice(0, 5).forEach(c => {
            html += `<tr><td>${formatDate(c.date)}</td><td>${c.type}</td><td>${formatCurrency(c.amount)}</td></tr>`;
          });
          html += '</tbody></table></div>';
          contribContainer.innerHTML = html;
        }

        // Latest announcements
        const annContainer = document.getElementById('latestAnnouncements');
        if (announcements.length === 0) {
          annContainer.innerHTML = '<p style="color:var(--text-light)">No announcements yet.</p>';
        } else {
          let html = '';
          announcements.slice(0, 3).forEach(a => {
            html += `<div class="announcement-item">
              <div class="ann-title">${a.title}</div>
              <div class="ann-date">${formatDate(a.created_at)}</div>
              <div class="ann-body">${a.body}</div>
            </div>`;
          });
          annContainer.innerHTML = html;
        }
      } catch (err) {
        showAlert(err.message);
      }
    }

    loadDashboard();
  </script>
</body>
</html>
