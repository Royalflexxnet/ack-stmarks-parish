<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — ACK St. Mark's Parish</title>
  <link rel="stylesheet" href="portal.css">
  <style>
    .admin-badge {
      background: var(--danger);
      color: white;
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <p style="text-align:center;margin-bottom:0.5rem"><a href="/" style="color:var(--accent);font-size:0.85rem">&larr; Back to Home</a></p>
      <h1>Admin Login</h1>
      <p class="auth-subtitle">ACK St. Mark's Parish - Malaa <span class="admin-badge">Admin</span></p>
      <div id="alert"></div>
      <form id="adminLoginForm">
        <div class="form-group">
          <label for="username">Admin Username</label>
          <input type="text" id="username" required placeholder="Enter admin username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Enter admin password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Sign In as Admin</button>
      </form>
      <div class="auth-footer">
        <a href="login">Back to Member Login</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const alert = document.getElementById('alert');
      alert.innerHTML = '';

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) {
          alert.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
          return;
        }
        localStorage.setItem('admin_token', data.token);
        localStorage.setItem('admin_info', JSON.stringify(data.admin));
        window.location.href = '/portal/admin-dashboard';
      } catch {
        alert.innerHTML = `<div class="alert alert-error">Login failed. Please check your credentials.</div>`;
      }
    });
  </script>
</body>
</html>
