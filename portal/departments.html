<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Departments — ACK St. Mark's Parish - Malaa</title>
  <link rel="stylesheet" href="portal.css">
</head>
<body>
  <div class="portal-header">
    <div class="brand"><img src="../img/ACK%20MACHAKOS%20LOGO.png" alt="ACK Logo" style="height:30px;width:auto"> <a href="/" style="color:inherit;text-decoration:none">ACK St. Mark's Parish - Malaa</a></div>
    <div class="user-info">
      <span id="displayName"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <nav class="portal-nav">
    <a href="dashboard">Dashboard</a>
    <a href="profile">My Profile</a>
    <a href="card">Membership Card</a>
    <a href="payments">Payments</a>
    <a href="announcements">Announcements</a>
    <a href="departments" class="active">Departments</a>
    <a href="/" style="border-left:1px solid var(--bg-alt);color:var(--accent)">&#8592; Site Home</a>
  </nav>
  <div class="portal-container">
    <div id="alert"></div>
    <div class="card">
      <h2>Church Departments</h2>
      <p style="color:var(--text-light);margin-bottom:1.5rem">Join a department and serve in the area of your calling</p>
      <p style="color:var(--text-light);margin-bottom:1.5rem" id="currentDept"><em>Loading your current department...</em></p>
      <div class="dept-grid" id="deptGrid"><p style="color:var(--text-light)">Loading departments...</p></div>
    </div>
  </div>

  <script src="portal.js"></script>
  <script>
    requireAuth();

    async function loadDepartments() {
      try {
        const depts = await apiFetch('/departments');
        const profile = await apiFetch('/members/profile');
        document.getElementById('displayName').textContent = profile.full_name;

        const currentDept = profile.department;
        const deptInfo = document.getElementById('currentDept');
        if (currentDept) {
          deptInfo.innerHTML = `You are currently serving in: <strong>${currentDept}</strong>`;
        } else {
          deptInfo.innerHTML = 'You are not yet in a department. Select one below to join.';
        }

        const grid = document.getElementById('deptGrid');
        let html = '';
        depts.forEach(d => {
          const isCurrent = d.name === currentDept;
          html += `<div class="dept-card">
            <h4>${d.name}</h4>
            <p>${d.description}</p>
            ${isCurrent
              ? '<span class="badge badge-success">Your Department</span>'
              : `<button class="btn btn-primary btn-sm" onclick="joinDept('${d.name}')">Join</button>`
            }
          </div>`;
        });
        grid.innerHTML = html;
      } catch (err) {
        showAlert(err.message);
      }
    }

    async function joinDept(name) {
      try {
        await apiFetch('/departments/join', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ department: name })
        });
        showAlert(`You have joined ${name}!`, 'success');
        loadDepartments();
      } catch (err) {
        showAlert(err.message);
      }
    }

    loadDepartments();
  </script>
</body>
</html>
