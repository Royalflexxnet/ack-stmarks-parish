<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payments — ACK St. Mark's Parish - Malaa</title>
  <link rel="stylesheet" href="portal.css">
</head>
<body>
  <div class="portal-header">
    <div class="brand"><img src="../img/ACK%20MACHAKOS%20LOGO.png" alt="ACK Logo" style="height:30px;width:auto"> <a href="/" style="color:inherit;text-decoration:none">ACK St. Mark's Parish - Malaa</a></div>
    <div class="user-info">
      <span id="displayName"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <nav class="portal-nav">
    <a href="dashboard">Dashboard</a>
    <a href="profile">My Profile</a>
    <a href="card">Membership Card</a>
    <a href="payments" class="active">Payments</a>
    <a href="announcements">Announcements</a>
    <a href="departments">Departments</a>
    <a href="/" style="border-left:1px solid var(--bg-alt);color:var(--accent)">&#8592; Site Home</a>
  </nav>
  <div class="portal-container">
    <div id="alert"></div>

    <div style="display:flex;gap:1rem;flex-wrap:wrap">
      <div class="card" style="flex:1;min-width:200px">
        <div style="font-size:0.85rem;color:var(--text-light)">Total Contributions</div>
        <div style="font-size:1.8rem;font-weight:700" id="totalContributions">—</div>
      </div>
      <div class="card" style="flex:1;min-width:200px">
        <div style="font-size:0.85rem;color:var(--text-light)">Number of Contributions</div>
        <div style="font-size:1.8rem;font-weight:700" id="contributionCount">—</div>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;margin-bottom:1rem">
        <h2 style="margin:0">Contribution Statement</h2>
        <button class="btn btn-primary" onclick="downloadStatement()">Download Statement (PDF)</button>
      </div>
      <div id="contributionsList"><p style="color:var(--text-light)">Loading...</p></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="portal.js"></script>
  <script>
    requireAuth();

    let allContributions = [];

    async function loadPayments() {
      try {
        const summary = await apiFetch('/payments/summary');
        const contributions = await apiFetch('/payments');
        const profile = await apiFetch('/members/profile');

        allContributions = contributions;

        document.getElementById('displayName').textContent = profile.full_name;
        document.getElementById('totalContributions').textContent = formatCurrency(summary.total);
        document.getElementById('contributionCount').textContent = contributions.length;

        const container = document.getElementById('contributionsList');
        if (contributions.length === 0) {
          container.innerHTML = '<p style="color:var(--text-light)">No contributions recorded yet.</p>';
          return;
        }

        let html = '<div class="table-wrap"><table><thead><tr><th>#</th><th>Date</th><th>Description</th><th>Amount (KES)</th></tr></thead><tbody>';
        contributions.forEach((c, i) => {
          html += `<tr><td>${i + 1}</td><td>${formatDate(c.date)}</td><td>${c.type}${c.description ? ' — ' + c.description : ''}</td><td><strong>${formatCurrency(c.amount)}</strong></td></tr>`;
        });
        html += '</tbody></table></div>';
        container.innerHTML = html;
      } catch (err) {
        showAlert(err.message);
      }
    }

    loadPayments();

    async function downloadStatement() {
      const contributions = allContributions;
      if (contributions.length === 0) { showAlert('No contributions to generate a statement.'); return; }

      const profile = await apiFetch('/members/profile');
      const dates = contributions.map(c => new Date(c.date));
      const minDate = new Date(Math.min(...dates));
      const maxDate = new Date(Math.max(...dates));
      const period = minDate.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) + ' — ' + maxDate.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      const genDate = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });

      const fmt = n => Number(n).toLocaleString('en-US', { minimumFractionDigits: 0 });
      let balance = 0, total = 0, rows = '';
      contributions.forEach((c, i) => {
        balance += c.amount; total += c.amount;
        const d = new Date(c.date).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        const desc = c.type + (c.description ? ' - ' + c.description : '');
        rows += `<tr${i%2===0?' style="background:#f5f5f5"':''}><td style="padding:5px 3px;border-bottom:1px solid #ddd">${i+1}</td><td style="padding:5px 3px;border-bottom:1px solid #ddd">${d}</td><td style="padding:5px 3px;border-bottom:1px solid #ddd">${desc}</td><td style="padding:5px 3px;border-bottom:1px solid #ddd;text-align:right">${fmt(c.amount)}</td><td style="padding:5px 3px;border-bottom:1px solid #ddd;text-align:right">${fmt(balance)}</td></tr>`;
      });

      const printWin = window.open('', '', 'width=800,height=600');
      printWin.document.write(`
<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Contribution Statement - ${profile.full_name}</title>
<style>
  @page { margin: 15mm 15mm; size: A4; }
  * { box-sizing: border-box; }
  body { font-family: 'Courier New', monospace; color: #000; margin: 0; padding: 0; font-size: 12px; }
  .stmt { max-width: 750px; margin: 0 auto; padding: 30px 20px; }
  .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 20px; }
  .header img { height: 50px; width: auto; margin-bottom: 8px; }
  .header h1 { font-size: 16px; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
  .header p { margin: 3px 0; font-size: 11px; }
  .title { text-align: center; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; font-weight: bold; }
  .info { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 1px solid #999; }
  .period { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 20px; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th { border-bottom: 2px solid #000; padding: 6px 3px; text-align: left; }
  th:last-child, th:nth-last-child(2) { text-align: right; }
  td { padding: 5px 3px; border-bottom: 1px solid #ddd; }
  td:last-child, td:nth-last-child(2) { text-align: right; }
  .total td { border-top: 2px solid #000; padding: 8px 3px; font-weight: bold; text-align: right; }
  .total td:last-child, .total td:nth-last-child(2) { text-align: right; }
  .footer { text-align: center; margin-top: 20px; padding-top: 15px; border-top: 2px solid #000; font-size: 10px; }
  @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
</style>
</head>
<body>
<div class="stmt">
  <div class="header">
    <img src="${window.location.origin}/img/ACK%20MACHAKOS%20LOGO.png" alt="ACK">
    <h1>ACK St. Mark's Parish - Malaa</h1>
    <p>P.O. Box 12345, Malaa, Machakos</p>
    <p>Email: info@ackstmarks.or.ke | Tel: +254 700 000 000</p>
  </div>
  <div class="title">Contribution Statement</div>
  <div class="info">
    <div><strong>Member:</strong> ${profile.full_name}</div>
    <div><strong>Membership No:</strong> ${profile.membership_no}</div>
    <div><strong>Phone:</strong> ${profile.phone}</div>
  </div>
  <div class="period">
    <div><strong>Period:</strong> ${period}</div>
    <div><strong>Generated:</strong> ${genDate}</div>
  </div>
  <table>
    <thead><tr><th>#</th><th>Date</th><th>Description</th><th style="text-align:right">Amount (KES)</th><th style="text-align:right">Balance (KES)</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr class="total"><td colspan="3">TOTAL</td><td>${fmt(total)}</td><td>${fmt(balance)}</td></tr></tfoot>
  </table>
  <div class="footer">
    <p style="margin:3px 0">Thank you for your faithful giving!</p>
    <p style="margin:3px 0">"God loves a cheerful giver" — 2 Corinthians 9:7</p>
    <p style="margin:5px 0;color:#666">This is a computer-generated statement. No signature required.</p>
  </div>
</div>
<script>window.onload = function() { setTimeout(function() { window.print(); window.close(); }, 500); } <\/script>
</body>
</html>`);
      printWin.document.close();
    }
  </script>
</body>
</html>
