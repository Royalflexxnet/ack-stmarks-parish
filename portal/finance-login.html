<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Login — ACK St. Mark's Parish - Malaa</title>
  <link rel="stylesheet" href="portal.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
    .login-card { width: 100%; max-width: 400px; padding: 2rem; }
    .login-card h1 { text-align: center; margin-bottom: 0.25rem; font-size: 1.3rem; }
    .login-card .subtitle { text-align: center; color: var(--text-light); font-size: 0.85rem; margin-bottom: 1.5rem; }
    .login-card .btn { width: 100%; }
    .login-card .alert { margin-bottom: 1rem; }
    .back-link { display: block; text-align: center; margin-top: 1rem; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="card login-card">
    <div style="text-align:center;margin-bottom:0.5rem">
      <img src="../img/ACK%20MACHAKOS%20LOGO.png" alt="ACK Logo" style="height:40px">
    </div>
    <h1>Finance Portal</h1>
    <p class="subtitle">ACK St. Mark's Parish - Malaa</p>
    <div id="alert"></div>
    <form onsubmit="financeLogin(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" required autocomplete="username" placeholder="Enter username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" placeholder="Enter password">
      </div>
      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>
    <a href="/" class="back-link">&larr; Back to Home</a>
  </div>

  <script>
    const token = localStorage.getItem('finance_token');
    if (token) window.location.href = 'finance-dashboard';

    async function financeLogin(e) {
      e.preventDefault();
      const alertEl = document.getElementById('alert');
      alertEl.innerHTML = '';
      try {
        const res = await fetch('/api/finance/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) { alertEl.innerHTML = `<div class="alert alert-error">${data.error}</div>`; return; }
        localStorage.setItem('finance_token', data.token);
        localStorage.setItem('finance_user', JSON.stringify(data.user));
        window.location.href = 'finance-dashboard';
      } catch (err) { alertEl.innerHTML = `<div class="alert alert-error">Login failed</div>`; }
    }
  </script>
</body>
</html>
