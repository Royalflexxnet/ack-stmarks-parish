<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Membership Card — ACK St. Mark's Parish - Malaa</title>
  <link rel="stylesheet" href="portal.css">
</head>
<body>
  <div class="portal-header">
    <div class="brand"><img src="../img/ACK%20MACHAKOS%20LOGO.png" alt="ACK Logo" style="height:30px;width:auto"> <a href="/" style="color:inherit;text-decoration:none">ACK St. Mark's Parish - Malaa</a></div>
    <div class="user-info">
      <span id="displayName"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <nav class="portal-nav">
    <a href="dashboard">Dashboard</a>
    <a href="profile">My Profile</a>
    <a href="card" class="active">Membership Card</a>
    <a href="payments">Payments</a>
    <a href="announcements">Announcements</a>
    <a href="departments">Departments</a>
    <a href="/" style="border-left:1px solid var(--bg-alt);color:var(--accent)">&#8592; Site Home</a>
  </nav>
  <div class="portal-container">
    <div id="alert"></div>
    <div class="card" style="text-align:center">
      <h2>My Membership Card</h2>
      <p style="color:var(--text-light);margin-bottom:2rem">Your digital membership card for ACK St. Mark's Parish - Malaa</p>
      <div id="cardContainer">
        <div class="member-card">
          <div>
            <div class="card-top">
              <div class="card-church" style="text-align:center">ACK St. Mark's Parish - Malaa</div>
              <img src="../img/ACK%20MACHAKOS%20LOGO.png" alt="ACK Logo" class="card-logo" style="height:1.5rem;width:auto;opacity:0.8;margin-top:0.1rem;display:block;margin-left:auto;margin-right:auto">
            </div>
            <div class="card-membership-label">MEMBERSHIP</div>
            <div class="card-name" id="cardName">—</div>
            <div class="card-id">Member #<span id="cardId">—</span></div>
          </div>
          <div class="card-details">
            <div>
              <div class="detail-label">Fellowship</div>
              <div class="detail-value" id="cardFellowship">—</div>
            </div>
            <div>
              <div class="detail-label">Department</div>
              <div class="detail-value" id="cardDepartment">—</div>
            </div>
            <div>
              <div class="detail-label">Contact</div>
              <div class="detail-value" id="cardPhone">—</div>
            </div>
            <div>
              <div class="detail-label">Since</div>
              <div class="detail-value" id="cardSince">—</div>
            </div>
          </div>
        </div>
      </div>
      <div class="card-actions" style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="window.print()">Print Card</button>
        <button class="btn btn-primary" onclick="downloadPNG()">Download as PNG</button>
      </div>
    </div>
  </div>

  <script src="portal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    requireAuth();

    async function loadCard() {
      try {
        const card = await apiFetch('/members/card');
        const profile = await apiFetch('/members/profile');

        document.getElementById('displayName').textContent = card.name;
        document.getElementById('cardName').textContent = card.name;
        document.getElementById('cardId').textContent = card.membership_no;
        document.getElementById('cardFellowship').textContent = card.fellowship || 'N/A';
        document.getElementById('cardDepartment').textContent = card.department || 'N/A';
        document.getElementById('cardPhone').textContent = card.phone;
        document.getElementById('cardSince').textContent = formatDate(card.member_since);
      } catch (err) {
        showAlert(err.message);
      }
    }

    async function downloadPNG() {
      const cardEl = document.querySelector('.member-card');
      try {
        const canvas = await html2canvas(cardEl, {
          scale: 4,
          backgroundColor: null,
          useCORS: true
        });
        const link = document.createElement('a');
        link.download = 'membership-card.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (err) {
        showAlert('Failed to generate image');
      }
    }

    loadCard();
  </script>
</body>
</html>
